<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="cell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0.12"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g opacity="0.95">
    <ellipse cx="430" cy="380" rx="220" ry="160" fill="url(#cell)" stroke="#22c55e" stroke-opacity="0.35" stroke-width="2"/>
    <ellipse cx="990" cy="560" rx="260" ry="190" fill="url(#cell)" stroke="#60a5fa" stroke-opacity="0.30" stroke-width="2"/>
    <ellipse cx="760" cy="310" rx="170" ry="125" fill="url(#cell)" stroke="#a78bfa" stroke-opacity="0.25" stroke-width="2"/>

    <circle cx="450" cy="400" r="55" fill="#22c55e" fill-opacity="0.18" stroke="#bbf7d0" stroke-opacity="0.25"/>
    <circle cx="1000" cy="580" r="70" fill="#60a5fa" fill-opacity="0.16" stroke="#dbeafe" stroke-opacity="0.25"/>
  </g>

  <g>
    <text x="80" y="90" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="34" font-weight="700">Imagen de ejemplo</text>
    <text x="80" y="130" fill="#94a3b8" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="18">Reemplaza este SVG por una microfotografía real (JPG/PNG/TIFF convertido) en public/slides/</text>
    <text x="80" y="160" fill="#94a3b8" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="18">y actualiza los hotspots en src/slides/slides.js</text>
  </g>
</svg>
